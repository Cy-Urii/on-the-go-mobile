<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Linguistics Travel Bible 🇹🇭</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0d1117;
      --card:   #161b22;
      --border: #30363d;
      --text:   #f0f6fc;
      --muted:  #8b949e;
      --accent: #e04a2c;
      --gold:   #f0a500;
      --green:  #3fb950;
      --blue:   #79c0ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
    }
    .hdr-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      margin-bottom: 8px;
    }
    .app-name  { font-size: 0.95rem; font-weight: 700; }
    .app-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .p-toggle {
      display: flex; gap: 3px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px; padding: 3px;
      flex-shrink: 0;
    }
    .p-btn {
      padding: 4px 10px; border: none; border-radius: 7px;
      cursor: pointer; font-size: 0.73rem; font-weight: 700;
      background: transparent; color: var(--muted);
      white-space: nowrap; transition: all 0.15s;
      font-family: 'Noto Sans Thai', -apple-system, sans-serif;
    }
    .p-btn.on { background: var(--accent); color: #fff; }

    .search-wrap { position: relative; }
    .search-ico  {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem; pointer-events: none;
    }
    input[type="search"] {
      width: 100%; padding: 9px 12px 9px 34px;
      background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 0.95rem;
      outline: none; -webkit-appearance: none;
    }
    input[type="search"]::placeholder { color: var(--muted); }
    input[type="search"]:focus        { border-color: var(--accent); }

    /* ── TABS ─────────────────────────────────────────────── */
    #tabs {
      position: fixed; left: 0; right: 0; z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto;
      padding: 0 8px; scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 12px; border: none; background: transparent;
      color: var(--muted); font-size: 0.82rem; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.15s; flex-shrink: 0;
    }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--border); color: var(--muted);
      font-size: 0.6rem; border-radius: 9px;
      padding: 1px 5px; margin-left: 4px; font-weight: 700;
    }
    .tab.on .badge { background: rgba(224,74,44,0.15); color: var(--accent); }

    /* ── MAIN ─────────────────────────────────────────────── */
    main { padding: 14px 12px 80px; max-width: 560px; margin: 0 auto; }

    .cat-hdr {
      font-size: 0.67rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin: 16px 0 8px 2px; font-weight: 700;
    }
    .cat-hdr:first-child { margin-top: 4px; }

    /* ── PHRASE CARD ──────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 13px; padding: 13px 13px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .card.strd { border-left: 3px solid var(--gold); padding-left: 10px; }

    .rule-banner {
      background: #1a2a1a; border: 1px solid #2e4d2e;
      border-radius: 12px; padding: 12px 14px;
      font-size: 0.82rem; color: #7ecf7e; line-height: 1.5;
    }

    .card-body { flex: 1; min-width: 0; }
    .c-en {
      font-size: 0.68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px;
    }
    .c-th {
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text); line-height: 1.4; margin-bottom: 1px;
    }
    .c-ph { font-size: 0.83rem; color: var(--blue); font-style: italic; }

    .card-btns { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .btn {
      width: 40px; height: 40px; border: none; border-radius: 10px;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
      background: var(--border); color: var(--muted);
    }
    .btn:active { transform: scale(0.88); }
    .btn.cp.ok  { background: var(--green); color: #fff; }
    .btn.st     { background: transparent; }
    .btn.st.on  { color: var(--gold); }

    /* ── EMPTY STATE ──────────────────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .ico { font-size: 2.4rem; display: block; margin-bottom: 10px; }

    /* ── TOAST ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green); color: #fff;
      padding: 9px 22px; border-radius: 20px;
      font-size: 0.88rem; font-weight: 600;
      z-index: 999; pointer-events: none; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.22s ease;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

}

function withP(phrase) {
  if (!phrase.p) return { th: phrase.th, ph: phrase.ph };
  const P = S.p === 'f' ? PF : PM;
  return { th: phrase.th + P.th, ph: phrase.ph + ' ' + P.ph };
}

// ── Layout: offset main below fixed header + tabs ──────────────────────────
function reflow() {
  const hh = document.getElementById('hdr').offsetHeight;
  const tabs = document.getElementById('tabs');
  tabs.style.top = hh + 'px';
  document.getElementById('main').style.paddingTop = (hh + tabs.offsetHeight + 12) + 'px';
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const defs = [
    { id: 'starred', label: '⭐ Saved' },
    ...Object.entries(DATA).map(([id, c]) => ({ id, label: c.label }))
  ];
  document.getElementById('tabs').innerHTML = defs.map(t => {
    const badge = t.id === 'starred' && S.starred.size > 0
      ? `<span class="badge">${S.starred.size}</span>` : '';
    return `<button class="tab${S.tab === t.id ? ' on' : ''}" onclick="setTab('${t.id}')">${t.label}${badge}</button>`;
  }).join('');
  reflow();
}

function setTab(id) {
  S.tab = id;
  S.q   = '';
  document.getElementById('q').value = '';
  renderTabs();
  renderPhrases();
  window.scrollTo(0, 0);
}

// ── Star ───────────────────────────────────────────────────────────────────
function pid(cat, i) { return `${cat}:${i}`; }

function toggleStar(id) {
  S.starred.has(id) ? S.starred.delete(id) : S.starred.add(id);
  localStorage.setItem('ltb_v1', JSON.stringify([...S.starred]));
  renderTabs();
  renderPhrases();
}

// ── Copy ───────────────────────────────────────────────────────────────────
function doCopy(btn) {
  const text = btn.closest('.card').dataset.th;
  const ok = () => {
    btn.classList.add('ok'); btn.textContent = '✓';
    toast('Copied!');
    setTimeout(() => { btn.classList.remove('ok'); btn.textContent = '📋'; }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(ok).catch(() => fallback(text, ok));
  } else {
    fallback(text, ok);
  }
}

function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  cb();
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Search ─────────────────────────────────────────────────────────────────
function onQ(val) {
  S.q = val.toLowerCase().trim();
  renderPhrases();
}

// ── Build card HTML ────────────────────────────────────────────────────────
function card(catId, phrase, i) {
  if (phrase.type === 'rule') {
    return `<div class="rule-banner">${phrase.en}</div>`;
  }
  const id   = pid(catId, i);
  const strd = S.starred.has(id);
  const ap   = withP(phrase);
  const thEsc = ap.th.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return `<div class="card${strd?' strd':''}" data-th="${thEsc}">
    <div class="card-body">
      <div class="c-en">${phrase.en}</div>
      <div class="c-th" lang="th">${ap.th}</div>
      <div class="c-ph">${ap.ph}</div>
    </div>
    <div class="card-btns">
      <button class="btn cp" onclick="doCopy(this)" aria-label="Copy">📋</button>
      <button class="btn st${strd?' on':''}" onclick="toggleStar('${id}')" aria-label="Star">${strd?'⭐':'☆'}</button>
    </div>
  </div>`;
}

// ── Render phrases ─────────────────────────────────────────────────────────
function renderPhrases() {
  const el = document.getElementById('main');
  const q  = S.q;

  // ── Saved tab ──
  if (S.tab === 'starred') {
    const parts = [];
    Object.entries(DATA).forEach(([cid, cat]) => {
      cat.phrases.forEach((ph, i) => {
        if (S.starred.has(pid(cid, i))) parts.push(card(cid, ph, i));
      });
    });
    el.innerHTML = parts.length
      ? parts.join('')
      : '<div class="empty"><span class="ico">⭐</span>Tap ☆ on any phrase to save it here</div>';
    return;
  }

  // ── Search ──
  if (q) {
    const parts = [];
    Object.entries(DATA).forEach(([cid, cat]) => {
      const hits = cat.phrases
        .map((ph, i) => ({ ph, i }))
        .filter(({ ph }) =>
          ph.en.toLowerCase().includes(q) ||
          ph.ph.toLowerCase().includes(q) ||
          ph.th.includes(q)
        );
      if (hits.length) {
        parts.push(`<div class="cat-hdr">${cat.label}</div>`);
        hits.forEach(({ ph, i }) => parts.push(card(cid, ph, i)));
      }
    });
    el.innerHTML = parts.length
      ? parts.join('')
      : `<div class="empty"><span class="ico">🔍</span>Nothing found for "${S.q}"</div>`;
    return;
  }

  // ── Normal tab ──
  const cat = DATA[S.tab];
  if (!cat) { el.innerHTML = ''; return; }
  el.innerHTML = cat.phrases.map((ph, i) => card(S.tab, ph, i)).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderTabs();
renderPhrases();
window.addEventListener('resize', reflow);
</script>
</body>
</html>
